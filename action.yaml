name: 'Discord Notifier'

description: 'Send message notifications to Discord'

inputs:
    webhookUrl:
        description: 'Discord Webhook URL'
        required: true
    projectName:
        description: 'Name of the project'
        required: true
    needs:
        description: 'JSON-encoded needs context of the calling job, pass the toJson(needs) expression. The overall status and the list of failed jobs are derived from it.'
        required: true
    testResultsUrl:
        description: 'URL to test results'
        required: false
    sonarProjectKey:
        description: 'SonarCloud project key'
        required: false
    sonarUrl:
        description: 'SonarCloud url'
        required: false
    sonarQualityGateStatus:
        description: 'Status of the SonarCloud Quality Gate'
        required: false
    username:
        description: 'Username to display in the message'
        required: false
    avatarUrl:
        description: 'URL to the avatar image'
        required: false

runs:
    using: 'node24'
    main: 'dist/main.js'
