name: Release

# Manual release. Set the version in package.json first (in a PR), merge to
# main, then run this workflow. It builds, verifies dist is current, and tags
# the current main commit as vX.Y.Z while moving the floating major tag (vX)
# so consumers can pin `@vX` and receive patches automatically.

on:
    workflow_dispatch:

permissions:
    contents: write

jobs:
    release:
        name: Tag release
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
              with:
                  fetch-depth: 0

            - uses: actions/setup-node@v6
              with:
                  node-version: 24

            - name: Install dependencies
              run: npm ci

            - name: Lint
              run: npm run lint

            - name: Rebuild dist
              run: npm run build

            - name: Verify dist is up to date
              run: |
                  if ! git diff --quiet dist; then
                    echo "::error::Committed dist/ is out of date. Run 'npm run build' and commit before releasing."
                    git diff --stat dist
                    exit 1
                  fi

            - name: Read version from package.json
              id: pkg
              run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

            - name: Create and push tags
              env:
                  VERSION: ${{ steps.pkg.outputs.version }}
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

                  MAJOR="v${VERSION%%.*}"

                  if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
                    echo "::error::Tag v${VERSION} already exists. Bump the version in package.json first."
                    exit 1
                  fi

                  git tag "v${VERSION}"
                  git tag -f "${MAJOR}"

                  git push origin "v${VERSION}"
                  git push -f origin "${MAJOR}"

                  echo "Released v${VERSION} and moved ${MAJOR}"

    notify:
        name: Notify Discord
        runs-on: ubuntu-latest
        needs: [release]
        if: always()
        steps:
            - uses: actions/checkout@v7

            # Dogfood: run this repo's own action from the checkout.
            - uses: ./
              with:
                  webhookUrl: ${{ secrets.DISCORD_WEBHOOK }}
                  projectName: actions-notify-discord
                  needs: ${{ toJson(needs) }}
